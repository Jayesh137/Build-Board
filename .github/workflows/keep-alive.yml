name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 9 */3 * *'  # Every 3 days at 9am UTC (well within Supabase's 7-day pause threshold)
  workflow_dispatch:        # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          HTTP_CODE=$(curl -s --fail \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "https://asgcxmublpxblxmoicjg.supabase.co/rest/v1/projects?select=id&limit=1" \
            -o /dev/null -w "%{http_code}")
          echo "Keep-alive ping sent at $(date) — HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Expected 200, got $HTTP_CODE. Check SUPABASE_ANON_KEY secret."
            exit 1
          fi
